name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows:
    name: Windows (MSVC) build + test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  ubuntu:
    name: Ubuntu (GCC) build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

# macOS is intentionally not covered here: FluxInfer's POSIX process runner
# (src/process/process_runner_posix.cpp) has only been syntax-checked, not
# build/run-tested, on macOS. Add a macOS job once that's been verified for
# real rather than assuming Linux-compatible POSIX code also behaves
# correctly under launchd/BSD specifics.
